<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CSW PosTÚlate · Portal de Vacantes</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f9 0%, #e0e8f2 100%);
            font-family: 'Inter', sans-serif;
            color: #102b3c;
            min-height: 100vh;
            padding: 1rem;
        }

        /* Contenedor principal fluido */
        .csw-app {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            transition: all 0.2s;
        }

        /* ========= TARJETA DE ACCESO ========= */
        .access-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            margin: 1rem 0;
        }
        .access-header {
            background: linear-gradient(135deg, #134b6b, #1f6392);
            padding: 1.5rem 1rem;
            text-align: center;
        }
        .access-header h2 {
            color: white;
            font-weight: 800;
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            letter-spacing: -0.3px;
        }
        .access-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .access-option {
            background: #f9fdfe;
            border-radius: 1.75rem;
            padding: 1.5rem 1rem;
            text-align: center;
            transition: all 0.2s;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .access-option:hover {
            transform: translateY(-3px);
            background: white;
            box-shadow: 0 12px 20px rgba(0,0,0,0.08);
        }
        .option-icon {
            font-size: 2.5rem;
            color: #2c7da0;
            margin-bottom: 0.5rem;
        }
        .option-title {
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .option-desc {
            font-size: 0.8rem;
            color: #5f8dae;
        }
        .btn-access {
            background: #2c7da0;
            border: none;
            color: white;
            padding: 0.7rem 1rem;
            border-radius: 3rem;
            font-weight: 700;
            margin-top: 1rem;
            width: 100%;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .admin-gear {
            text-align: right;
            padding: 0.8rem 1.5rem 1.2rem;
            border-top: 1px solid #e2edf4;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }
        .gear-icon {
            font-size: 1.6rem;
            color: #8bb4cc;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Header de la app (post-login) */
        .app-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
            gap: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .logo-area h1 {
            font-weight: 800;
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            background: linear-gradient(130deg, #134b6b, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .user-badge {
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-logout {
            background: none;
            border: none;
            margin-left: 8px;
            color: #5c7f9c;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Tabs scroll horizontal en móvil */
        .tabs-container {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 0.6rem;
            margin-bottom: 1.8rem;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.2rem;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 3rem;
            cursor: pointer;
            transition: 0.2s;
            color: #2c6e93;
            white-space: nowrap;
        }
        .tab-btn i { margin-right: 6px; }
        .tab-btn.active {
            background: #1f6392;
            color: white;
            box-shadow: 0 6px 12px -6px rgba(31,99,146,0.4);
        }
        .tab-btn.disabled-tab {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Grid de vacantes: responsive 1 columna en móvil, 2 en tablets, 3 en desktop */
        .vacancies-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        @media (min-width: 560px) {
            .vacancies-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 1024px) {
            .vacancies-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Tarjeta de vacante */
        .vacancy-card {
            background: white;
            border-radius: 1.75rem;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 10px 18px -8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2f0f7;
            cursor: pointer;
        }
        .vacancy-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 22px 28px -12px rgba(0, 40, 60, 0.2);
        }
        .card-inner {
            padding: 1.3rem;
        }
        .job-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: #164863;
            margin-bottom: 0.4rem;
            word-break: break-word;
        }
        .job-badge {
            display: inline-block;
            background: #eef3fc;
            padding: 0.2rem 0.8rem;
            border-radius: 3rem;
            font-size: 0.65rem;
            font-weight: 700;
            margin-bottom: 0.7rem;
        }
        .job-desc-preview {
            color: #2c627f;
            font-size: 0.8rem;
            line-height: 1.4;
            margin-bottom: 0.4rem;
        }
        .extra-details {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            margin-top: 0;
        }
        .vacancy-card:hover .extra-details {
            max-height: 400px;
            opacity: 1;
            margin-top: 0.8rem;
        }
        .requirements {
            background: #f6fbfe;
            padding: 0.6rem 0.8rem;
            border-radius: 1.5rem;
            font-size: 0.75rem;
            margin: 8px 0;
            border-left: 3px solid #2c7da0;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }
        .btn-apply {
            background: #1f6392;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
        }
        .btn-whatsapp {
            background: #25D366;
        }
        .empty-message {
            background: white;
            border-radius: 2rem;
            text-align: center;
            padding: 2rem 1rem;
            color: #6f9abe;
        }
        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6c94ae;
            padding: 1rem;
        }

        /* Panel Admin (responsive) */
        .admin-panel-responsive {
            background: white;
            border-radius: 1.75rem;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        @media (min-width: 640px) {
            .form-row {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .form-row .form-group {
                flex: 1;
                min-width: 140px;
            }
        }
        .form-group label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #4f7a9e;
            display: block;
            margin-bottom: 4px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border-radius: 2rem;
            border: 1.5px solid #d9e4ec;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
        }
        .btn-primary {
            background: #2c7da0;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 3rem;
            color: white;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        .admin-vacancy-item {
            background: #f9fdfe;
            border-radius: 1.5rem;
            padding: 0.8rem;
            margin-bottom: 0.7rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        @media (min-width: 500px) {
            .admin-vacancy-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
        .admin-actions-buttons button {
            background: #eef3fc;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            margin-left: 6px;
            font-size: 0.7rem;
        }

        /* Modal responsive */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 1rem;
        }
        .modal-card {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 340px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="csw-app" id="cswApp"></div>

<script>
    // ---------- BASE DE DATOS DE VACANTES ----------
    let vacancies = [
        { id: "v1", title: "Senior Frontend Developer", department: "Ingeniería", location: "Remoto (Latam)", contract: "Full-time", description: "Desarrollo con React, Next.js, Tailwind. Liderazgo técnico en componentes.", requirements: "5+ años en React, TypeScript, sistemas de diseño.", confidential: false },
        { id: "v2", title: "Product Manager", department: "Producto", location: "Híbrido CDMX", contract: "Tiempo completo", description: "Estrategia de producto, OKRs, discovery con stakeholders.", requirements: "Experiencia en SaaS, metodologías ágiles.", confidential: false },
        { id: "v3", title: "Arquitecto de Datos", department: "Data & AI", location: "Remoto", contract: "Estratégico", description: "Arquitectura Data Lakehouse, gobernanza, modelos avanzados.", requirements: "AWS, Snowflake, +8 años experiencia cloud.", confidential: true },
        { id: "v4", title: "Head of Talent Acquisition", department: "People", location: "Bogotá / Remoto", contract: "Dirección", description: "Liderar reclutamiento masivo y employer branding.", requirements: "5+ años liderando equipos de selección.", confidential: true },
        { id: "v5", title: "DevOps Engineer", department: "Infraestructura", location: "Santiago", contract: "Full-time", description: "CI/CD, Kubernetes, monitoreo y optimización.", requirements: "Docker, Jenkins, Terraform.", confidential: false },
        { id: "v6", title: "Especialista en CRM (Confidencial)", department: "Comercial", location: "Remoto", contract: "Alta gerencia", description: "Optimización de CRM Salesforce, reportes ejecutivos.", requirements: "Salesforce admin, 4 años de experiencia.", confidential: true }
    ];

    let appState = {
        accessLevel: null,   // 'guest', 'confidential', 'admin'
        activeTab: "open"
    };

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function saveToLocal() { localStorage.setItem('csw_vacancies_db', JSON.stringify(vacancies)); }
    function loadFromLocal() {
        const stored = localStorage.getItem('csw_vacancies_db');
        if(stored) vacancies = JSON.parse(stored);
    }
    loadFromLocal();

    function renderApp() {
        const container = document.getElementById('cswApp');
        if(!container) return;
        if(appState.accessLevel === null) {
            renderAccessCard(container);
            return;
        }
        renderPortal(container);
        attachPostulationEvents();
    }

    function renderAccessCard(container) {
        container.innerHTML = `
            <div class="access-card">
                <div class="access-header">
                    <h2><i class="fas fa-chalkboard-user"></i> CSW PosTÚlate</h2>
                    <p style="color: #cbe4f0; font-size:0.75rem;">Portal de oportunidades internas</p>
                </div>
                <div class="access-body">
                    <div class="access-option" data-mode="guest">
                        <div class="option-icon"><i class="fas fa-globe-americas"></i></div>
                        <div class="option-title">Modo Invitado</div>
                        <div class="option-desc">Sin contraseña · Solo vacantes abiertas</div>
                        <button class="btn-access guest-btn">Ingresar como Invitado</button>
                    </div>
                    <div class="access-option" data-mode="confidential">
                        <div class="option-icon"><i class="fas fa-user-secret"></i></div>
                        <div class="option-title">Acceso Confidencial</div>
                        <div class="option-desc">Vacantes abiertas + confidenciales</div>
                        <input type="password" id="confidentialPass" placeholder="Contraseña" style="width:100%; margin-top:8px; padding:8px; border-radius:2rem; border:1px solid #cde1ec;">
                        <button class="btn-access confidential-login-btn" style="margin-top:8px;">Validar acceso</button>
                    </div>
                </div>
                <div class="admin-gear">
                    <span style="font-size:0.7rem;">Acceso administrador</span>
                    <i class="fas fa-cog gear-icon" id="adminGearIcon"></i>
                </div>
            </div>
        `;
        const guestBtn = container.querySelector('.guest-btn');
        if(guestBtn) guestBtn.addEventListener('click', () => {
            appState.accessLevel = 'guest';
            appState.activeTab = 'open';
            renderApp();
        });
        const confidentialBtn = container.querySelector('.confidential-login-btn');
        const passInput = container.getElementById('confidentialPass');
        const validateConf = () => {
            if(passInput.value === 'Confidencial2026') {
                appState.accessLevel = 'confidential';
                appState.activeTab = 'open';
                renderApp();
            } else { alert('Contraseña inválida'); passInput.value = ''; }
        };
        if(confidentialBtn) confidentialBtn.addEventListener('click', validateConf);
        if(passInput) passInput.addEventListener('keypress', e => { if(e.key === 'Enter') validateConf(); });
        
        const gearBtn = container.getElementById('adminGearIcon');
        if(gearBtn) gearBtn.addEventListener('click', () => showAdminPasswordModal());
    }

    function showAdminPasswordModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-overlay';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <i class="fas fa-user-cog" style="font-size:2rem; color:#2c7da0;"></i>
                <h3 style="margin:12px 0">Administrador</h3>
                <input type="password" id="adminPwdModal" placeholder="Contraseña" style="width:100%; padding:10px; border-radius:2rem; margin-bottom:15px;">
                <button id="submitAdminModal" style="background:#2c7da0; width:100%; padding:10px; border-radius:2rem; color:white; font-weight:bold; border:none;">Verificar</button>
                <button id="cancelAdminModal" style="margin-top:12px; background:none; border:none; color:#7c9bbb;">Cancelar</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const submitBtn = document.getElementById('submitAdminModal');
        const cancelBtn = document.getElementById('cancelAdminModal');
        const pwdField = document.getElementById('adminPwdModal');
        const verify = () => {
            if(pwdField.value === 'Administrador2026') {
                appState.accessLevel = 'admin';
                appState.activeTab = 'open';
                modalDiv.remove();
                renderApp();
            } else { alert('Contraseña incorrecta'); pwdField.value = ''; }
        };
        submitBtn.onclick = verify;
        cancelBtn.onclick = () => modalDiv.remove();
        pwdField.addEventListener('keypress', e => { if(e.key === 'Enter') verify(); });
    }

    function renderPortal(container) {
        const isGuest = appState.accessLevel === 'guest';
        const isConfidential = appState.accessLevel === 'confidential';
        const isAdmin = appState.accessLevel === 'admin';
        const tabs = [
            { id: 'open', label: 'Vacantes Abiertas', icon: 'fa-briefcase', enabled: true },
            { id: 'confidential', label: 'Confidenciales', icon: 'fa-lock', enabled: (isConfidential || isAdmin) },
            { id: 'admin', label: 'Administrador', icon: 'fa-toolbox', enabled: isAdmin }
        ];
        let tabsHtml = `<div class="tabs-container">`;
        tabs.forEach(tab => {
            const isActive = (appState.activeTab === tab.id);
            const disabledClass = !tab.enabled ? 'disabled-tab' : '';
            tabsHtml += `<button class="tab-btn ${isActive ? 'active' : ''} ${disabledClass}" data-tab="${tab.id}" ${!tab.enabled ? 'disabled' : ''}><i class="fas ${tab.icon}"></i> ${tab.label}</button>`;
        });
        tabsHtml += `</div>`;
        
        let headerHtml = `
            <div class="app-header">
                <div class="logo-area"><h1><i class="fas fa-chalkboard-user"></i> CSW PosTÚlate</h1></div>
                <div><span class="user-badge"><i class="fas ${isGuest ? 'fa-user-friends' : (isAdmin ? 'fa-user-shield' : 'fa-user-secret')}"></i> ${isGuest ? 'Invitado' : (isAdmin ? 'Administrador' : 'Confidencial')}</span>
                <button class="btn-logout" id="logoutMainBtn"><i class="fas fa-sign-out-alt"></i> Salir</button></div>
            </div>
        `;
        
        if(appState.activeTab === 'admin' && isAdmin) {
            const adminPanel = renderAdminPanel();
            container.innerHTML = headerHtml + tabsHtml + adminPanel + `<footer><i class="fas fa-envelope"></i> Postulaciones: prueba@comasw.com · <i class="fab fa-whatsapp"></i> WhatsApp</footer>`;
            attachTabEvents(tabs);
            attachLogout();
            attachAdminCrudEvents();
            return;
        }
        
        let visibleVacancies = [];
        if(appState.activeTab === 'open') visibleVacancies = vacancies.filter(v => !v.confidential);
        else if(appState.activeTab === 'confidential' && (isConfidential || isAdmin)) visibleVacancies = vacancies.filter(v => v.confidential === true);
        
        let gridHtml = `<div class="vacancies-grid">`;
        if(visibleVacancies.length === 0) gridHtml += `<div class="empty-message"><i class="fas fa-info-circle"></i> No hay vacantes en esta sección.</div>`;
        else {
            visibleVacancies.forEach(v => {
                const confBadge = v.confidential ? '<span class="job-badge" style="background:#FFEAD2;"><i class="fas fa-mask"></i> Confidencial</span>' : '<span class="job-badge"><i class="fas fa-globe-americas"></i> Abierta</span>';
                gridHtml += `
                    <div class="vacancy-card">
                        <div class="card-inner">
                            <div class="job-title">${escapeHtml(v.title)}</div>
                            ${confBadge}
                            <div class="job-desc-preview"><i class="fas fa-building"></i> ${escapeHtml(v.department)} · ${escapeHtml(v.location)}</div>
                            <div class="job-desc-preview"><strong>Descripción:</strong> ${escapeHtml(v.description.substring(0, 85))}${v.description.length>85?'...':''}</div>
                            <div class="extra-details">
                                <div class="requirements"><i class="fas fa-clipboard-list"></i> <strong>Requisitos:</strong> ${escapeHtml(v.requirements)}</div>
                                <div><i class="fas fa-clock"></i> ${escapeHtml(v.contract)}</div>
                                <div class="btn-group">
                                    <button class="btn-apply email-apply" data-title="${escapeHtml(v.title)}" data-desc="${escapeHtml(v.description)}" data-reqs="${escapeHtml(v.requirements)}" data-dept="${escapeHtml(v.department)}"><i class="fas fa-envelope"></i> Email</button>
                                    <button class="btn-apply btn-whatsapp whatsapp-apply" data-title="${escapeHtml(v.title)}" data-desc="${escapeHtml(v.description)}" data-reqs="${escapeHtml(v.requirements)}"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        gridHtml += `</div>`;
        container.innerHTML = headerHtml + tabsHtml + gridHtml + `<footer><i class="fas fa-shield-alt"></i> CSW PosTÚlate · Talento que conecta</footer>`;
        attachTabEvents(tabs);
        attachLogout();
        attachPostulationEvents();
    }

    function renderAdminPanel() {
        return `
            <div class="admin-panel-responsive">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:1rem;"><i class="fas fa-plus-circle" style="font-size:1.5rem; color:#2c7da0;"></i><h3>Crear nueva vacante</h3></div>
                <div class="form-row">
                    <div class="form-group"><label>Título *</label><input type="text" id="adminTitle" placeholder="Ej. Ingeniero de Datos"></div>
                    <div class="form-group"><label>Departamento</label><input type="text" id="adminDept" placeholder="Tecnología"></div>
                    <div class="form-group"><label>Ubicación</label><input type="text" id="adminLoc" placeholder="Remoto"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Contrato</label><input type="text" id="adminContract" placeholder="Full-time"></div>
                    <div class="form-group"><label>Pestaña</label><select id="adminTabSelect"><option value="false">Abiertas</option><option value="true">Confidenciales</option></select></div>
                    <div class="form-group"><button id="createVacancyAdminBtn" class="btn-primary">+ Crear</button></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Descripción</label><input type="text" id="adminDesc" placeholder="Descripción general"></div>
                    <div class="form-group"><label>Requisitos</label><input type="text" id="adminReqs" placeholder="Requisitos clave"></div>
                </div>
                <hr style="margin: 1rem 0;">
                <h4><i class="fas fa-list"></i> Gestionar vacantes</h4>
                <div id="adminVacanciesList"></div>
            </div>
        `;
    }

    function attachAdminCrudEvents() {
        const createBtn = document.getElementById('createVacancyAdminBtn');
        if(createBtn) {
            createBtn.onclick = () => {
                const title = document.getElementById('adminTitle').value.trim();
                if(!title) { alert("Título requerido"); return; }
                const dept = document.getElementById('adminDept').value.trim() || "General";
                const loc = document.getElementById('adminLoc').value.trim() || "Remoto";
                const contract = document.getElementById('adminContract').value.trim() || "Full-time";
                const desc = document.getElementById('adminDesc').value.trim() || "Descripción pendiente";
                const reqs = document.getElementById('adminReqs').value.trim() || "Requisitos por definir";
                const isConf = document.getElementById('adminTabSelect').value === 'true';
                vacancies.push({ id: generateId(), title, department: dept, location: loc, contract, description: desc, requirements: reqs, confidential: isConf });
                saveToLocal();
                ['adminTitle','adminDept','adminLoc','adminContract','adminDesc','adminReqs'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
                renderApp();
            };
        }
        renderAdminVacanciesList();
    }

    function renderAdminVacanciesList() {
        const containerList = document.getElementById('adminVacanciesList');
        if(!containerList) return;
        if(vacancies.length === 0) { containerList.innerHTML = '<p>No hay vacantes</p>'; return; }
        let html = '';
        vacancies.forEach(v => {
            html += `
                <div class="admin-vacancy-item">
                    <div><strong>${escapeHtml(v.title)}</strong> <span style="font-size:0.65rem; background:#e0edf5; padding:2px 8px; border-radius:2rem;">${v.confidential ? 'Confidencial' : 'Abierta'}</span><br>${escapeHtml(v.department)}</div>
                    <div class="admin-actions-buttons">
                        <button class="edit-admin-item" data-id="${v.id}"><i class="fas fa-edit"></i> Editar</button>
                        <button class="delete-admin-item" data-id="${v.id}"><i class="fas fa-trash"></i> Eliminar</button>
                    </div>
                </div>
            `;
        });
        containerList.innerHTML = html;
        document.querySelectorAll('.edit-admin-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const vac = vacancies.find(v => v.id === id);
                if(vac) {
                    let newTitle = prompt("Editar título", vac.title);
                    if(newTitle) vac.title = newTitle;
                    let newDesc = prompt("Descripción", vac.description);
                    if(newDesc !== null) vac.description = newDesc;
                    let newReqs = prompt("Requisitos", vac.requirements);
                    if(newReqs !== null) vac.requirements = newReqs;
                    let newDept = prompt("Departamento", vac.department);
                    if(newDept !== null) vac.department = newDept;
                    let newConf = confirm("¿Confidencial? (Aceptar=Si, Cancelar=No)");
                    vac.confidential = newConf;
                    saveToLocal();
                    renderApp();
                }
            });
        });
        document.querySelectorAll('.delete-admin-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                if(confirm("Eliminar vacante?")) {
                    vacancies = vacancies.filter(v => v.id !== id);
                    saveToLocal();
                    renderApp();
                }
            });
        });
    }

    function attachTabEvents(tabs) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            const tabId = btn.getAttribute('data-tab');
            if(tabId && !btn.disabled) btn.addEventListener('click', () => { appState.activeTab = tabId; renderApp(); });
        });
    }
    function attachLogout() {
        const logoutBtn = document.getElementById('logoutMainBtn');
        if(logoutBtn) logoutBtn.onclick = () => { appState.accessLevel = null; appState.activeTab = "open"; renderApp(); };
    }
    function attachPostulationEvents() {
        document.querySelectorAll('.email-apply').forEach(btn => {
            btn.onclick = () => {
                const title = btn.getAttribute('data-title');
                const desc = btn.getAttribute('data-desc');
                const reqs = btn.getAttribute('data-reqs');
                const dept = btn.getAttribute('data-dept');
                const body = `Deseo postularme al puesto de: ${title}\n\nDetalles:\nDepartamento: ${dept}\nDescripción: ${desc}\nRequisitos: ${reqs}`;
                window.open(`mailto:prueba@comasw.com?subject=Postulación a ${encodeURIComponent(title)}&body=${encodeURIComponent(body)}`, '_blank');
            };
        });
        document.querySelectorAll('.whatsapp-apply').forEach(btn => {
            btn.onclick = () => {
                const title = btn.getAttribute('data-title');
                const desc = btn.getAttribute('data-desc');
                const reqs = btn.getAttribute('data-reqs');
                const text = `¡Hola! Me interesa postularme a "${title}".%0A%0ADescripción: ${desc}%0ARequisitos: ${reqs}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };
        });
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    renderApp();
</script>
</body>
</html>
